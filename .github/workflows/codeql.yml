---
name: CodeQL
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "37 15 * * 6" # 15:37 UTC on saturday

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: rust
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4.35.3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@v4.35.3
        with:
          category: /language:${{ matrix.language }}
